name: Keep Render Awake

on:
  schedule:
    # This runs every 14 minutes
    - cron: '*/14 * * * *'
  # Allows you to manually run the job for testing
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: curl -s https://local-library-mdn.onrender.com > /dev/null
